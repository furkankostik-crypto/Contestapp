<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#38bdf8">
    <meta name="description" content="Yarışma soruları ve takım puanlarını takip eden çevrimdışı çalışan uygulama">
    <title>Yarışma Takip v1.3</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230f172a' width='192' height='192'/><rect fill='%2338bdf8' x='48' y='48' width='96' height='96' rx='10'/><text x='96' y='120' font-size='60' font-weight='bold' fill='%230f172a' text-anchor='middle'>Y</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230f172a' width='192' height='192'/><rect fill='%2338bdf8' x='48' y='48' width='96' height='96' rx='10'/><text x='96' y='120' font-size='60' font-weight='bold' fill='%230f172a' text-anchor='middle'>Y</text></svg>">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 10px; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }

        /* Sayaç */
        .timer-display { font-size: 42px; font-weight: bold; text-align: center; margin: 10px 0; color: var(--accent-color); font-variant-numeric: tabular-nums; }
        .timer-display.finished { color: var(--danger); animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* Stats & Controls */
        .controls-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .edit-mode-btn { background: var(--card-bg); color: var(--warning); border: 1px solid var(--warning); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .edit-mode-btn.active { background: var(--warning); color: #000; }

        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 9px; color: #94a3b8; }
        .stat-item b { font-size: 14px; color: var(--accent-color); }

        /* Table */
        .table-wrapper { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th, td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background: #334155; color: #cbd5e1; }
        
        /* Satır tıklama ve silme animasyonu */
        tr.clickable { cursor: pointer; transition: background 0.2s; }
        tr.clickable:active { background: #334155; }
        .delete-cell { display: none; color: var(--danger); font-weight: bold; width: 40px; }
        .edit-active .delete-cell { display: table-cell; }

        /* Floating Button */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: none; color: #0f172a; z-index: 100; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 15px; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; margin: 10px auto; border: 1px solid var(--border-color); }

        .chip-group { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .chip { flex: 1; min-width: 50px; padding: 10px 5px; background: #0f172a; border: 1px solid var(--border-color); border-radius: 10px; text-align: center; font-size: 12px; }
        .chip.active { border-color: var(--accent-color); color: var(--accent-color); }
        .chip.correct.active { background: var(--success); color: white; border-color: var(--success); }
        .chip.wrong.active { background: var(--danger); color: white; border-color: var(--danger); }
        .chip.timer-btn { background: #334155; border: none; color: white; }
        
        .save-btn { width: 100%; padding: 16px; background: var(--accent-color); color: #0f172a; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; margin-top: 15px; }
        #setup-screen button { width: 100%; padding: 20px; margin-bottom: 15px; background: var(--card-bg); color: white; border: 1px solid var(--border-color); border-radius: 15px; font-size: 18px; }
        
        .puan-input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        input[type="number"] { width: 65px; background: #0f172a; border: 1px solid var(--border-color); color: var(--accent-color); padding: 6px; border-radius: 8px; text-align: center; }
        
        .puan-controls { display: flex; align-items: center; gap: 8px; }
        .puan-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 32px; height: 32px; padding: 0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.2s; }
        .puan-btn:hover { background: var(--accent-color); color: #0f172a; border-color: var(--accent-color); }
        
        /* Timer Section */
        #timer-section { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" style="margin-top: 15vh; text-align: center;">
        <h1 style="margin-bottom: 30px;">Yarışma Takip</h1>
        <button onclick="startApp(2)">2 Takım</button>
        <button onclick="startApp(3)">3 Takım</button>
        <button onclick="startApp(4)">4 Takım</button>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="controls-row">
            <button class="edit-mode-btn" id="edit-toggle" onclick="toggleEditMode()">Tabloyu Düzenle</button>
            <button class="edit-mode-btn" id="clear-all" onclick="clearAllData()" style="margin-left:8px; display:none;">Tümünü Sil</button>
            <button class="edit-mode-btn" id="return-to-setup" onclick="returnToTeamSelection()" style="margin-left:8px;">Takım Seçimine Dön</button>
        </div>

        <div class="header-stats" id="stats-bar"></div>
        
        <div class="table-wrapper">
            <table id="main-table">
                <thead><tr id="table-head"><th>#</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <button class="fab" onclick="openModal()">+</button>
    </div>
</div>

<div class="modal" id="entry-modal">
    <div class="modal-content">
        <h3 id="modal-title" style="text-align: center; margin-bottom: 15px;">Yeni Soru</h3>
        
        <div id="timer-section">
            <div class="timer-display" id="timer-text">00</div>
            <div id="timer-start-buttons" class="chip-group">
                <div class="chip timer-btn" onclick="startTimer(15)">15s</div>
                <div class="chip timer-btn" onclick="startTimer(20)">20s</div>
                <div class="chip timer-btn" onclick="startTimer(25)">25s</div>
                <div class="chip timer-btn" onclick="startTimer(30)">30s</div>
            </div>
            <div id="timer-control-buttons" class="chip-group" style="display:none;">
                <div class="chip timer-btn" onclick="addTime(5)">+5s</div>
                <div class="chip timer-btn" onclick="addTime(10)">+10s</div>
                <div class="chip timer-btn" onclick="addTime(15)">+15s</div>
                <div class="chip timer-btn" onclick="resetTimer()" style="color:var(--danger)">X</div>
            </div>
        </div>

        <div class="form-section" style="border-top: 1px solid var(--border-color); padding-top:10px;">
            <label style="font-size: 11px; color: #94a3b8;">BONUS</label>
            <div class="chip-group">
                <div class="chip active bonus-chip" onclick="setBonus(1, this)">x1</div>
                <div class="chip bonus-chip" onclick="setBonus(2, this)">x2</div>
                <div class="chip bonus-chip" onclick="setBonus(3, this)">x3</div>
                <div class="chip bonus-chip" onclick="setBonus(4, this)">x4</div>
            </div>
        </div>

        <div id="team-inputs-container"></div>

        <div class="manual-puan-section" style="margin-top:15px; border-top: 1px dashed var(--border-color); padding-top:10px;">
            <label style="font-size: 11px; color: #94a3b8; display: block; margin-bottom: 8px;">HESAPLANAN PUANLAR</label>
            <div id="manual-puan-inputs"></div>
        </div>

        <button class="save-btn" id="save-btn" onclick="saveEntry()">KAYDET</button>
        <button onclick="closeModal()" style="width: 100%; padding: 12px; background: transparent; color: #94a3b8; border: none;">Kapat</button>
    </div>
</div>

<script>
    let teamCount = 0, scores = [], isEditMode = false;
    let currentBonus = 1, currentResponses = [], currentManualScores = [];
    let editingIndex = -1; // -1 ise yeni kayıt, >=0 ise güncelleme
    let timeLeft = 0, timerInterval = null, audioContext = null, ringtoneOscillators = [];
    let isTimerActive = false; // Sayaç aktif durumunu takip et

    // Verileri localStorage'a kaydet
    function saveData() {
        localStorage.setItem('contestData', JSON.stringify({
            teamCount: teamCount,
            scores: scores
        }));
    }

    // Verileri localStorage'dan yükle
    function loadData() {
        const saved = localStorage.getItem('contestData');
        if (saved) {
            const data = JSON.parse(saved);
            teamCount = data.teamCount;
            scores = data.scores;
        }
    }

    // Sayfa yüklenirken veri yükle
    window.addEventListener('load', () => {
        loadData();
        if (teamCount > 0) {
            // Eğer kayıtlı takım sayısı varsa direkt ana ekrana git
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            const head = document.getElementById('table-head');
            head.innerHTML = '<th>#</th>';
            for(let i=1; i<=teamCount; i++) {
                let th = document.createElement('th'); th.innerText = 'T' + i; head.appendChild(th);
            }
            let delTh = document.createElement('th'); delTh.className = 'delete-cell'; delTh.innerText = 'Sil';
            head.appendChild(delTh);
            renderTable();
            updateStats();
        }
    });

    function startBeep() {
        if (ringtoneOscillators.length > 0) return; // Zaten çalıyorsa tekrar başlatma

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = [440, 554.37, 659.25]; // C5, C#5, E5
        const gainNode = audioContext.createGain();
        gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
        gainNode.connect(audioContext.destination);

        frequencies.forEach(freq => {
            const osc = audioContext.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioContext.currentTime);
            osc.connect(gainNode);
            osc.start();
            ringtoneOscillators.push(osc);
        });
    };

    function stopBeep() {
        ringtoneOscillators.forEach(osc => {
            osc.stop();
            osc.disconnect();
        });
        ringtoneOscillators = [];
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
    }

    function startTimer(s) { 
        stopBeep(); // Yeni zamanlayıcı başladığında sesi durdur
        clearInterval(timerInterval); timeLeft = s; isTimerActive = true; 
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--; updateTimerUI();
            if(timeLeft <= 0) { 
                clearInterval(timerInterval); 
                startBeep(); // Zaman 0'a ulaştığında sürekli çal
                document.getElementById('timer-text').classList.add('finished'); 
            }
        }, 1000);
    }
    function addTime(s) { 
        stopBeep(); // Sürekli sesi durdur
        timeLeft += s; updateTimerUI(); document.getElementById('timer-text').classList.remove('finished'); 
    }
    function resetTimer() { 
        stopBeep(); // Sürekli sesi durdur
        clearInterval(timerInterval); timeLeft = 0; isTimerActive = false; updateTimerUI(); document.getElementById('timer-text').classList.remove('finished'); 
    }
    function updateTimerUI() { 
        document.getElementById('timer-text').innerText = timeLeft < 0 ? 0 : timeLeft; 
        // Buton görünürlüğünü güncelle
        document.getElementById('timer-start-buttons').style.display = isTimerActive ? 'none' : 'flex';
        document.getElementById('timer-control-buttons').style.display = isTimerActive ? 'flex' : 'none';
    }

    function startApp(count) {
        // Takım sayısı değişmediyse eski verileri koru
        if (teamCount === 0) {
            // İlk seçim
            teamCount = count;
            scores = [];
        } else if (teamCount !== count) {
            // Takım sayısı değişti, eski veriyi koru ancak konrolsüz olmayabilir
            teamCount = count;
        }
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        
        const head = document.getElementById('table-head');
        head.innerHTML = '<th>#</th>';
        for(let i=1; i<=teamCount; i++) {
            let th = document.createElement('th'); th.innerText = 'T' + i; head.appendChild(th);
        }
        let delTh = document.createElement('th'); delTh.className = 'delete-cell'; delTh.innerText = 'Sil';
        head.appendChild(delTh);
        
        renderTable();
        updateStats();
        saveData();
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('edit-toggle');
        const clearBtn = document.getElementById('clear-all');
        const table = document.getElementById('main-table');
        
        if(isEditMode) {
            btn.innerText = "Tamam"; btn.classList.add('active');
            clearBtn.style.display = 'block';
            table.classList.add('edit-active');
        } else {
            btn.innerText = "Tabloyu Düzenle"; btn.classList.remove('active');
            clearBtn.style.display = 'none';
            table.classList.remove('edit-active');
        }
    }

    function openModal(index = -1) {
        editingIndex = index;
        resetTimer();
        document.getElementById('modal-title').innerText = index === -1 ? "Yeni Soru Girişi" : `Soru ${scores[index].question} Düzenle`;
        document.getElementById('timer-section').style.display = index === -1 ? 'block' : 'none';

        if(index === -1) {
            currentBonus = 1;
            currentResponses = new Array(teamCount).fill(false);
            currentManualScores = new Array(teamCount).fill(0);
        } else {
            const data = scores[index];
            currentBonus = data.bonus || 1;
            currentResponses = [...data.responses];
            currentManualScores = [...data.teamScores];
        }

        renderForm();
        document.getElementById('entry-modal').style.display = 'block';
    }

    function renderForm() {
        // Bonus Chip Sync
        document.querySelectorAll('.bonus-chip').forEach((c, idx) => {
            c.classList.toggle('active', (idx + 1) === currentBonus);
        });

        const container = document.getElementById('team-inputs-container');
        container.innerHTML = '';
        for(let i=0; i<teamCount; i++) {
            const div = document.createElement('div');
            div.innerHTML = `
                <div style="font-size:12px; margin: 10px 0 5px 0;">Takım ${i+1}:</div>
                <div class="chip-group">
                    <div class="chip wrong ${!currentResponses[i] ? 'active' : ''}" id="t${i}-w" onclick="setResponse(${i}, false)">Yanlış</div>
                    <div class="chip correct ${currentResponses[i] ? 'active' : ''}" id="t${i}-c" onclick="setResponse(${i}, true)">Doğru</div>
                </div>
            `;
            container.appendChild(div);
        }
        refreshManualInputs();
    }

    function setResponse(idx, val) {
        currentResponses[idx] = val;
        renderForm();
        autoCalculate();
    }

    function setBonus(val, el) {
        currentBonus = val;
        autoCalculate();
        renderForm();
    }

    function autoCalculate() {
        let correctCount = currentResponses.filter(r => r === true).length;
        let points = 0;
        if (correctCount > 0) {
            if (teamCount === 2) points = (correctCount === 1) ? 2 : 1;
            else if (teamCount === 3) points = (correctCount === 1) ? 3 : (correctCount === 2 ? 2 : 1);
            else if (teamCount === 4) points = (5 - correctCount);
        }
        currentManualScores = currentResponses.map(r => r ? (points * currentBonus) : 0);
        refreshManualInputs();
    }

    function refreshManualInputs() {
        const container = document.getElementById('manual-puan-inputs');
        container.innerHTML = '';
        currentManualScores.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'puan-input-row';
            row.innerHTML = `
                <span>Takım ${i+1}:</span>
                <div class="puan-controls">
                    <button class="puan-btn" onclick="decreaseScore(${i})">−</button>
                    <input type="number" value="${s}" onchange="updateManualScore(${i}, this.value)">
                    <button class="puan-btn" onclick="increaseScore(${i})">+</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function increaseScore(i) { 
        currentManualScores[i] = parseInt(currentManualScores[i]) + 1; 
        refreshManualInputs(); 
    }

    function decreaseScore(i) { 
        currentManualScores[i] = Math.max(0, parseInt(currentManualScores[i]) - 1); 
        refreshManualInputs(); 
    }

    function updateManualScore(i, v) { currentManualScores[i] = parseInt(v) || 0; }

    function saveEntry() {
        const entry = {
            question: editingIndex === -1 ? (scores.length + 1) : scores[editingIndex].question,
            teamScores: [...currentManualScores],
            responses: [...currentResponses],
            bonus: currentBonus
        };

        if(editingIndex === -1) scores.push(entry);
        else scores[editingIndex] = entry;

        renderTable();
        updateStats();
        saveData(); // Verileri kaydet
        closeModal();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        // Soruları tersten (en yeni en üstte) göster
        [...scores].reverse().forEach((data, originalIdx) => {
            const realIdx = scores.length - 1 - originalIdx;
            const tr = document.createElement('tr');
            tr.className = 'clickable';
            tr.onclick = () => isEditMode ? null : openModal(realIdx);
            
            let html = `<td><b>${data.question}</b></td>`;
            data.teamScores.forEach(s => {
                html += `<td style="${s > 0 ? 'color: var(--success); font-weight:bold;' : 'color:#475569'}">${s}</td>`;
            });
            html += `<td class="delete-cell" onclick="event.stopPropagation(); deleteRow(${realIdx})">✕</td>`;
            tr.innerHTML = html;
            tbody.appendChild(tr);
        });
    }

    function deleteRow(idx) {
        if(confirm("Bu soruyu silmek istiyor musunuz?")) {
            scores.splice(idx, 1);
            // Soru numaralarını yeniden düzenle
            scores.forEach((s, i) => s.question = i + 1);
            renderTable();
            updateStats();
            saveData(); // Verileri kaydet
        }
    }

    function clearAllData() {
        if(confirm("TÜM veriler silinecek! Emin misiniz?")) {
            scores = [];
            renderTable();
            updateStats();
            toggleEditMode();
            saveData(); // localStorage'ı temizle
        }
    }

    function updateStats() {
        const bar = document.getElementById('stats-bar');
        let totals = new Array(teamCount).fill(0);
        scores.forEach(s => s.teamScores.forEach((pts, idx) => totals[idx] += pts));
        let html = `<div class="stat-item"><span>SORU</span><b>${scores.length}</b></div>`;
        totals.forEach((t, i) => { html += `<div class="stat-item"><span>T${i+1} PK</span><b>${t}</b></div>`; });
        bar.innerHTML = html;
    }

    function closeModal() { 
        document.getElementById('entry-modal').style.display = 'none'; 
        stopBeep(); 
        clearInterval(timerInterval); 
        timeLeft = 0; 
        isTimerActive = false;
        updateTimerUI();
    }

    function returnToTeamSelection() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('entry-modal').style.display = 'none'; // Modal'ı kapat
        
        // Düzenleme modunu kapat
        isEditMode = false;
        document.getElementById('edit-toggle').innerText = "Tabloyu Düzenle";
        document.getElementById('edit-toggle').classList.remove('active');
        document.getElementById('clear-all').style.display = 'none';
        
        // Ses ve timer'ı durdur
        stopBeep();
        clearInterval(timerInterval);
        timeLeft = 0;
        isTimerActive = false;
        
        // Verileri kaydet (teamCount ve scores korunur)
        saveData();
    }
</script>

<!-- Service Worker Register -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
            .then(reg => console.log('✓ Service Worker yüklendi'))
            .catch(err => console.log('✗ Service Worker hatası:', err));
        });
    }
</script>

</body>
</html>
